version: '3.8'

services:
  # PostgreSQL Database (used by Supabase)
  postgres:
    image: postgres:15-alpine
    container_name: alllegal_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alllegal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and async tasks
  redis:
    image: redis:7-alpine
    container_name: alllegal_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # OpenSearch for Hybrid Semantic Search (Matching Co-founder's config)
  opensearch:
    image: opensearchproject/opensearch:2.19.5
    container_name: law-opensearch
    ports:
      - "9200:9200"
    environment:
      - cluster.name=law-helper-dev
      - node.name=opensearch-node1
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - "OPENSEARCH_JAVA_OPTS=-Xms1500m -Xmx1500m"
      - knn.memory.circuit_breaker.enabled=true
      - knn.memory.circuit_breaker.limit=60%
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_opensearch-data:/usr/share/opensearch/data

volumes:
  postgres_data:
  redis_data:
  opensearch_opensearch-data:
    external: true
